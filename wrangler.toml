name = "atxrr"
main = "@astrojs/cloudflare/entrypoints/server"
# Keep at or below the date the pinned workerd supports, or local dev fails to
# boot ("newest date supported by this server binary").
compatibility_date = "2026-07-17"
# The async-iterable body bug that rendered "[object Object]"
# (withastro/astro#15434) is fixed in recent workerd, so the
# disable_nodejs_process_v2 opt-out this used to carry is no longer needed.
compatibility_flags = ["nodejs_compat", "global_fetch_strictly_public"]
upload_source_maps = true

[placement]
mode = "smart"

[[d1_databases]]
binding = "DB"
database_name = "atxrr-cms"
database_id = "b80b0d9b-7344-44d3-a656-041d813ec560"

[[r2_buckets]]
binding = "MEDIA"
bucket_name = "atxrr-media"

# Magic-link login, team invites and comment notifications. Bindings are not
# inherited by named environments, so this is repeated per env below.
[[send_email]]
name = "EMAIL"

# Staging mirrors production and shares its D1/R2 so the content only has to be
# migrated once.
#
# SITE_URL points at staging itself. It is tempting to set the apex here so one
# passkey covers both hosts (WebAuthn derives rpId from SITE_URL), but siteUrl
# also absolutizes media URLs — every image then resolves against the apex,
# which 404s HTML and gets ORB-blocked by the browser. Working images win; the
# tradeoff is a separate passkey per host.
[env.staging.vars]
SITE_URL = "https://staging.atxrubberroundup.com"
EMDASH_ALLOWED_ORIGINS = "https://staging.atxrubberroundup.com"
IS_STAGING = "true"

[[env.staging.routes]]
pattern = "staging.atxrubberroundup.com"
custom_domain = true

[[env.staging.d1_databases]]
binding = "DB"
database_name = "atxrr-cms"
database_id = "b80b0d9b-7344-44d3-a656-041d813ec560"

[[env.staging.r2_buckets]]
binding = "MEDIA"
bucket_name = "atxrr-media"

[[env.staging.send_email]]
name = "EMAIL"

[env.production.vars]
SITE_URL = "https://atxrubberroundup.com"

[[env.production.routes]]
pattern = "atxrubberroundup.com"
custom_domain = true

[[env.production.routes]]
pattern = "www.atxrubberroundup.com"
custom_domain = true

[[env.production.d1_databases]]
binding = "DB"
database_name = "atxrr-cms"
database_id = "b80b0d9b-7344-44d3-a656-041d813ec560"

[[env.production.r2_buckets]]
binding = "MEDIA"
bucket_name = "atxrr-media"

[[env.production.send_email]]
name = "EMAIL"

[observability]
enabled = true
